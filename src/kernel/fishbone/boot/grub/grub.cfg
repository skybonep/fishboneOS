#
# GRUB Configuration File for fishboneOS
#
# This file configures the GRUB bootloader:
# - Sets the boot timeout
# - Defines boot menu entries
# - Configures boot options
#

# Set the timeout to 1 second (how long GRUB waits before auto-booting)
# Change this to 5 or 10 if you want more time to interact with GRUB menu
set timeout=1

# Set default boot entry (0 = first entry)
set default=0

# Boot menu entry for fishboneOS
menuentry 'fishboneOS' {
    # Load the kernel ELF file
    # multiboot tells GRUB to use the multiboot protocol when loading
    # (GRUB will look for and validate the multiboot header we created)
    multiboot /boot/fishbone.elf
    boot
}
